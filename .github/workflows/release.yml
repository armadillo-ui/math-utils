name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com

      - name: Show .npmrc
        run: cat .npmrc 2>/dev/null || cat ~/.npmrc 2>/dev/null || echo "no .npmrc found"

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Bump version and generate changelog
        uses: cocogitto/cocogitto-action@v3
        id: release
        with:
          release: true
          check: false
          git-user: "github-actions[bot]"
          git-user-email: "github-actions[bot]@users.noreply.github.com"

      - name: Push release commit and tag
        if: steps.release.outputs.version != ''
        run: git push origin main --follow-tags

      - name: Build
        if: steps.release.outputs.version != ''
        run: npm run build

      - name: Publish to GitHub Packages
        if: steps.release.outputs.version != ''
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog for release
        if: steps.release.outputs.version != ''
        run: cog changelog --at ${{ steps.release.outputs.version }} > GITHUB_CHANGELOG.md

      - name: Create GitHub Release
        if: steps.release.outputs.version != ''
        run: |
          gh release create ${{ steps.release.outputs.version }} \
            --title "${{ steps.release.outputs.version }}" \
            --notes-file GITHUB_CHANGELOG.md \
            --target main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}