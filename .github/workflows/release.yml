name: Release

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 1. Setup + deps ─────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com

      - run: npm ci

      # ── 2. Validaciones ─────────────────────────────────────────────
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # ── 3. Cocogitto — bump + changelog ─────────────────────────────
      - name: Bump version and generate changelog
        uses: cocogitto/cocogitto-action@v3
        id: release
        with:
          release: true
          check: false
          git-user: "github-actions[bot]"
          git-user-email: "github-actions[bot]@users.noreply.github.com"

      # ── 4. Debug ─────────────────────────────────────────────────────
      - name: Debug
        if: always()
        run: |
          echo "── cocogitto outputs ──"
          echo "version : ${{ steps.release.outputs.version }}"
          echo ""
          echo "── git log (últimos 5 commits) ──"
          git log --oneline -5
          echo ""
          echo "── git tags ──"
          git tag --sort=-creatordate | head -5
          echo ""
          echo "── git status ──"
          git status
          echo ""
          echo "── git remote -v ──"
          git remote -v
          echo ""
          echo "── CHANGELOG.md existe? ──"
          ls -la CHANGELOG.md 2>/dev/null || echo "NO existe"

      # ── 5. Build y publish solo si cocogitto bumpeó ─────────────────
      - name: Build
        if: steps.release.outputs.version != ''
        run: npm run build

      - name: Sync version from git tag → package.json
        if: steps.release.outputs.version != ''
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          npm version "${VERSION#v}" --no-git-tag-version --allow-same-version

      - name: Publish to GitHub Packages
        if: steps.release.outputs.version != ''
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 6. Generar changelog y crear GitHub Release ──────────────────
      - name: Generate changelog for release
        if: steps.release.outputs.version != ''
        run: cog changelog --at ${{ steps.release.outputs.version }} > GITHUB_CHANGELOG.md

      - name: Create GitHub Release
        if: steps.release.outputs.version != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.version }}
          body_path: GITHUB_CHANGELOG.md