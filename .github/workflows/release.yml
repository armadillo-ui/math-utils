name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # FIX #6: reutilizar el job de CI en lugar de duplicar typecheck + test.
  # El job de release no arranca hasta que este pase, garantizando
  # que nunca se publique código sin validar.
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test                   # FIX #6: solo corre si test pasa
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com

      - run: npm ci

      - run: npm audit signatures

      - name: Build
        run: npm run build

      - name: Release
        id: release
        run: bash scripts/release.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_AUTHOR_NAME: "github-actions[bot]"
          GIT_AUTHOR_EMAIL: "github-actions[bot]@users.noreply.github.com"

      - name: Publish to GitHub Packages
        if: steps.release.outputs.released == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        if: steps.release.outputs.released == 'true'
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          cat >> $GITHUB_STEP_SUMMARY << MD
          ## \`@armadillo-ui/math-utils@${VERSION#v}\` published 🚀

          | | |
          |---|---|
          | Version | [\`${VERSION}\`](https://github.com/armadillo-ui/math-utils/releases/tag/${VERSION}) |
          | Package | [GitHub Packages](https://github.com/armadillo-ui/math-utils/pkgs/npm/math-utils) |
          MD