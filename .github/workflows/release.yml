name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # para crear tags y commits
      packages: write   # para publicar en GitHub Packages

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0              # cocogitto necesita todo el historial
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 1. Setup + deps ─────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
          # Cambia a https://npm.pkg.github.com para GitHub Packages

      - run: npm ci

      # ── 2. Validaciones ─────────────────────────────────────────────
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # ── 3. Cocogitto — bump version + changelog (Rust, sin Node) ────
      - name: Bump version and generate changelog
        uses: cocogitto/cocogitto-action@v3
        id: release
        with:
          release: true
          git-user: "github-actions[bot]"
          git-user-email: "github-actions[bot]@users.noreply.github.com"

      # ── 4. Build y publish solo si hubo bump ────────────────────────
      - name: Build
        if: steps.release.outputs.bumped == 'true'
        run: npm run build

      - name: Sync version from git tag → package.json
        if: steps.release.outputs.bumped == 'true'
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          npm version "${VERSION#v}" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        if: steps.release.outputs.bumped == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── 5. GitHub Release con el changelog generado ─────────────────
      - name: Create GitHub Release
        if: steps.release.outputs.bumped == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release.outputs.version }}
          body_path: CHANGELOG.md