name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          registry-url: https://npm.pkg.github.com

      - run: npm ci

      - run: npm audit signatures

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Bump version and generate changelog
        uses: cocogitto/cocogitto-action@v3
        id: release
        with:
          release: true
          check: false
          git-user: "github-actions[bot]"
          git-user-email: "github-actions[bot]@users.noreply.github.com"

      - name: Push release commit and tag
        if: steps.release.outputs.version != ''
        run: git push origin main --follow-tags

      - name: Publish to GitHub Packages
        if: steps.release.outputs.version != ''
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate changelog for release
        if: steps.release.outputs.version != ''
        run: cog changelog --at ${{ steps.release.outputs.version }} > GITHUB_CHANGELOG.md

      - name: Create GitHub Release
        if: steps.release.outputs.version != ''
        run: |
          gh release create ${{ steps.release.outputs.version }} \
            --title "${{ steps.release.outputs.version }}" \
            --notes-file GITHUB_CHANGELOG.md \
            --target main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        if: steps.release.outputs.version != ''
        run: |
          VERSION="${{ steps.release.outputs.version }}"
          cat >> $GITHUB_STEP_SUMMARY << MD
          ## \`@armadillo-ui/math-utils@${VERSION#v}\` published

          | | |
          |---|---|
          | Version | [\`${VERSION}\`](https://github.com/armadillo-ui/math-utils/releases/tag/${VERSION}) |
          | Package | [GitHub Packages](https://github.com/armadillo-ui/math-utils/pkgs/npm/math-utils) |

          ### What's changed
          $(cat GITHUB_CHANGELOG.md)
          MD